<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-card">
      <div class="term-bar">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="term-title">snake — login</span>
      </div>
      <div class="term-body">
        <h1 class="gate-title">snake</h1>
        <div id="gateBody"></div>
        <p class="gate-msg" id="gateMsg"></p>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="app-card">
      <div class="term-bar">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="term-title">snake</span>
      </div>
      <div class="app-body">
        <div class="main">
          <div class="left">
            <div class="board">
              <canvas id="game" width="400" height="400"></canvas>
              <div class="overlay" id="overlay">
                <p class="overlay-title" id="overlayTitle">snake</p>
                <p class="overlay-msg">
                  <span id="overlayMsg">press space to start</span><span class="cursor">▊</span>
                </p>
              </div>
            </div>
            <div class="statusbar">
              <span id="score">score 0</span>
              <span id="best">best 0</span>
              <span class="keys"><span id="controlsHint">wasd/arrows · space</span> · <span id="mute">♪ on</span></span>
            </div>
          </div>

          <aside class="right">
            <div class="lb-head">leaderboard · top 20</div>
            <ol class="leaderboard" id="leaderboard"></ol>
            <p class="myrank" id="myrank"></p>
          </aside>
        </div>

        <footer class="footer">
          <div class="auth" id="auth"></div>
        </footer>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
