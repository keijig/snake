<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-box">
      <h1 class="gate-title">snake</h1>
      <div id="gateBody"></div>
      <p class="gate-msg" id="gateMsg"></p>
    </div>
  </div>

  <div class="wrap">
    <div class="board">
      <canvas id="game" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <p class="overlay-title" id="overlayTitle">snake</p>
        <p class="overlay-msg">
          <span id="overlayMsg">press space to start</span><span class="cursor">▊</span>
        </p>
      </div>
    </div>
    <div class="statusbar">
      <span id="score">score 0</span>
      <span id="best">best 0</span>
      <span class="keys">wasd/arrows · space · <span id="mute">♪ on</span></span>
    </div>

    <section class="panel" id="panel">
      <div class="auth" id="auth"></div>
      <div class="lb-head">leaderboard · top 20</div>
      <ol class="leaderboard" id="leaderboard"></ol>
      <p class="myrank" id="myrank"></p>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
